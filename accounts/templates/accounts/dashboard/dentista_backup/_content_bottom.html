<style>
    /* ==========================================================
   DASHBOARD - DENTISTA
========================================================== */

/* ==========================================================
   KPIs
========================================================== */

.stats-grid{
    grid-template-columns: repeat(3, 1fr);
}

/* ==========================================================
   SEGUNDA LINHA
========================================================== */

.dashboard-row-2{
    grid-template-columns: 2.2fr 1fr;
}

/* ==========================================================
   CARD CONSULTAS
========================================================== */

.appointments-card{
    min-height: 280px;
}

/* ==========================================================
   CARD ANIVERSARIANTES
========================================================== */

.birthday-card{
    min-height: 280px;
}
</style>

<div class="chart-card dashboard-bottom-card">

    <div class="card-header">
        <h5>📈 Minha Produção</h5>
    </div>

    <div class="table-responsive dashboard-scroll">

        <table class="table table-hover align-middle mb-0">

            <thead>

                <tr>
                    <th>Período</th>
                    <th class="text-end">Produção</th>
                </tr>

            </thead>

            <tbody>

                {% for dentista, total in ranking_dentistas %}

                <tr>

                    <td>Mês Atual</td>

                    <td class="text-end fw-bold text-success">
                        R$ {{ total|floatformat:2 }}
                    </td>

                </tr>

                {% empty %}

                <tr>

                    <td colspan="2" class="text-center py-4">
                        Nenhuma produção encontrada.
                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>
