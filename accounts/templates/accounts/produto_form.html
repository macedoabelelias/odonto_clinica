{% extends 'accounts/base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>

            {% if produto %}
                Editar Produto
            {% else %}
                Novo Produto
            {% endif %}

        </h1>

        <a href="{% url 'produtos' %}" class="btn btn-secondary">

            <i class="fa-solid fa-arrow-left"></i>

            Voltar

        </a>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Nome do Produto

                        </label>

                        <input
                            type="text"
                            name="nome"
                            class="form-control"
                            value="{{ produto.nome|default:'' }}"
                            required
                        >

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">

                            Código

                        </label>

                        <input
                            type="text"
                            name="codigo"
                            class="form-control"
                            value="{{ produto.codigo|default:'' }}"
                        >

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">

                            Estoque Atual

                        </label>

                        <input
                            type="number"
                            name="estoque"
                            class="form-control"
                            value="{{ produto.estoque|default:'0' }}"
                        >

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Estoque Mínimo

                        </label>

                        <input
                            type="number"
                            name="estoque_minimo"
                            class="form-control"
                            value="{{ produto.estoque_minimo|default:'0' }}"
                        >

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Valor de Compra

                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="valor_compra"
                            class="form-control"
                            value="{{ produto.valor_compra|default:'0.00' }}"
                        >

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Valor de Venda

                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="valor_venda"
                            class="form-control"
                            value="{{ produto.valor_venda|default:'0.00' }}"
                        >

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Descrição

                    </label>

                    <textarea
                        name="descricao"
                        rows="4"
                        class="form-control"
                    >{{ produto.descricao|default:'' }}</textarea>

                </div>

                <div class="d-flex justify-content-end gap-2">

                    <a href="{% url 'produtos' %}" class="btn btn-secondary">

                        Cancelar

                    </a>

                    <button type="submit" class="btn btn-primary">

                        <i class="fa-solid fa-floppy-disk"></i>

                        Salvar Produto

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
