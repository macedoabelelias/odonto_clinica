<!DOCTYPE html>
<html>

<head>
    <title>Medicamentos</title>
</head>

<body>

    <h2>Medicamentos</h2>

    <p>
        <a href="{% url 'novo_medicamento' %}">
            Novo Medicamento
        </a>
    </p>

    <table border="1" cellpadding="8">

        <tr>
            <th>Medicamento</th>
            <th>Concentração</th>
            <th>Categoria</th>
        </tr>

        {% for medicamento in medicamentos %}

        <tr>

            <td>{{ medicamento.nome }}</td>

            <td>{{ medicamento.concentracao }}</td>

            <td>{{ medicamento.get_categoria_display }}</td>

        </tr>

        {% empty %}

        <tr>

            <td colspan="3">

                Nenhum medicamento cadastrado.

            </td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
