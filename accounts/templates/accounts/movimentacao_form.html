{% extends 'accounts/base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>
            Nova Movimentação de Estoque
        </h1>

        <a
            href="{% url 'movimentacoes_estoque' %}"
            class="btn btn-secondary"
        >
            Voltar
        </a>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Produto
                        </label>

                        <select
                            name="produto"
                            class="form-select"
                            required
                        >

                            <option value="">
                                Selecione
                            </option>

                            {% for produto in produtos %}

                            <option value="{{ produto.id }}">
                                {{ produto.nome }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Tipo
                        </label>

                        <select
                            name="tipo"
                            class="form-select"
                            required
                        >

                            <option value="COMPRA">
                                Compra
                            </option>

                            <option value="ENTRADA">
                                Entrada
                            </option>

                            <option value="SAIDA">
                                Saída
                            </option>

                            <option value="AJUSTE">
                                Ajuste
                            </option>

                        </select>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Quantidade
                        </label>

                        <input
                            type="number"
                            min="1"
                            name="quantidade"
                            class="form-control"
                            required
                        >

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Observação
                    </label>

                    <textarea
                        name="observacao"
                        class="form-control"
                        rows="3"
                    ></textarea>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary"
                >
                    Salvar Movimentação
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
