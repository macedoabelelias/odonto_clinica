{% extends 'accounts/base.html' %}
{% load static %}

{% block content %}

<style>
    .btn-documento {
        min-height: 48px;
        padding: 12px 22px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
</style>

<div class="container-fluid">

    <div class="ficha-form-card">

        <div class="section-header-premium">

            <div class="section-icon blue">
                <i class="fa-solid fa-file-medical"></i>
            </div>

            <div>

                <h5>

                    {% if documento %}
                    Editar Documento
                    {% else %}
                    Novo Documento
                    {% endif %}

                </h5>

                <p>
                    Documento clínico do paciente.
                </p>

            </div>

        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-4">

                <label class="anamnese-label">
                    Modelo de Documento
                </label>

                <select name="template" class="anamnese-input">

                    <option value="">
                        Documento Livre
                    </option>

                    {% for template in templates %}

                    <option value="{{ template.id }}">

                        {{ template.nome }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <label class="anamnese-label">
                Título
            </label>

            <input type="text" name="titulo" class="anamnese-input" value="{{ documento.titulo|default:'' }}" required>

            <div class="mt-4">

                <textarea id="editor" name="conteudo">
                    {{ documento.conteudo|default:'' }}
                </textarea>

            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">

                {% if documento.id %}

                <a href="{% url 'perfil_paciente' documento.paciente.id %}"
                    class="btn btn-outline-secondary btn-documento">
                    <i class="fa-solid fa-arrow-left"></i>
                    Voltar
                </a>

                <a href="{% url 'imprimir_documento' documento.id %}" target="_blank"
                    class="btn btn-outline-primary btn-documento">
                    <i class="fa-solid fa-print"></i>
                    Imprimir PDF
                </a>

                {% else %}

                <a href="{% url 'perfil_paciente' paciente.id %}" class="btn btn-outline-secondary btn-documento">
                    <i class="fa-solid fa-arrow-left"></i>
                    Voltar
                </a>

                {% endif %}

                <button type="submit" class="btn-anamnese">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Salvar Documento
                </button>

            </div>
        </form>

    </div>

</div>

<script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>

<script>

    ClassicEditor
        .create(
            document.querySelector('#editor')
        )
        .catch(error => {
            console.error(error);
        });

</script>

{% endblock %}
