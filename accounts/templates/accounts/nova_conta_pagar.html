{% extends 'accounts/base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>
            Nova Conta a Pagar
        </h1>

        <a
            href="{% url 'contas_pagar' %}"
            class="btn btn-secondary"
        >
            Voltar
        </a>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Fornecedor
                        </label>

                        <select
                            name="fornecedor"
                            class="form-select"
                            required
                        >

                            <option value="">
                                Selecione
                            </option>

                            {% for fornecedor in fornecedores %}

                            <option
                                value="{{ fornecedor.id }}"
                            >

                                {{ fornecedor.nome }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Valor
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="valor"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Vencimento
                        </label>

                        <input
                            type="date"
                            name="vencimento"
                            class="form-control"
                            required
                        >

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Descrição
                    </label>

                    <textarea
                        name="descricao"
                        rows="3"
                        class="form-control"
                    ></textarea>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary"
                >

                    Salvar Conta

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
