{% extends 'accounts/base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-sm border-0">

                <div class="card-header bg-white">

                    <h4 class="mb-0">

                        <i class="fa-solid fa-key me-2"></i>

                        Alterar Senha

                    </h4>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Senha Atual
                            </label>

                            <input
                                type="password"
                                name="senha_atual"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Nova Senha
                            </label>

                            <input
                                type="password"
                                name="nova_senha"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Confirmar Nova Senha
                            </label>

                            <input
                                type="password"
                                name="confirmar_senha"
                                class="form-control"
                                required>

                        </div>

                        <div class="text-end">

                            <button
                                type="submit"
                                class="btn btn-primary">

                                <i class="fa-solid fa-floppy-disk me-2"></i>

                                Alterar Senha

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
