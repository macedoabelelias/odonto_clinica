<style>

/* =====================================================
   ESTRUTURA GERAL
===================================================== */

body{

    font-family:Arial,sans-serif;
    max-width:820px;
    margin:0 auto;
    color:#333;
    padding:0;

}


/* =====================================================
   CABEÇALHO
===================================================== */

.header{

    display:grid;

    grid-template-columns:240px 1fr 300px;

    column-gap:35px;

    align-items:center;

    border-bottom:3px solid #0d6efd;

    padding-bottom:18px;

    margin-bottom:25px;

}


/* =====================================================
   LOGO
===================================================== */

.header-logo{

    text-align:left;

}

.logo{

    width:190px;

    height:auto;

}


/* =====================================================
   TÍTULO DO RELATÓRIO
===================================================== */

.header-centro{

    text-align:center;

}

.header-centro h4{

    margin:0;

    color:#0d6efd;

    font-size:26px;

    font-weight:700;

    line-height:1.2;

}

.header-centro p{

    margin-top:12px;

    margin-bottom:4px;

    color:#64748b;

    font-size:13px;

}

.header-centro small{

    color:#64748b;

    font-size:12px;

}


/* =====================================================
   DADOS DA CLÍNICA
===================================================== */

.header-contato{

    text-align:right;

    font-size:13px;

    line-height:1.8;

}

.header-contato strong{

    display:block;

    font-size:16px;

    margin-bottom:8px;

    color:#212529;

}

/* =====================================================
   CARDS
===================================================== */

.card{

    border:1px solid #dbe2ea;

    border-radius:10px;

    padding:15px;

    margin-bottom:18px;

}

.card h4{

    margin-top:0;

    color:#1e293b;

}


/* =====================================================
   TABELAS
===================================================== */

table{

    width:100%;

    border-collapse:collapse;

    font-size:13px;

}

th{

    background:#0d6efd;

    color:#fff;

}

th,
td{

    border:1px solid #dbe2ea;

    padding:8px;

    text-align:left;

}


/* =====================================================
   TOTAIS
===================================================== */

.total{

    text-align:right;

    font-size:18px;

    font-weight:bold;

    color:#198754;

}


/* =====================================================
   RODAPÉ
===================================================== */

.rodape-pdf{

    margin-top:25px;

    padding-top:10px;

    border-top:1px solid #dbe2ea;

    text-align:center;

    font-size:11px;

    color:#64748b;

}


/* =====================================================
   BOTÃO DE IMPRESSÃO
===================================================== */

.acoes-pdf{

    position:fixed;

    top:15px;

    right:15px;

}

.acoes-pdf button{

    background:#0d6efd;

    color:white;

    border:none;

    padding:8px 16px;

    border-radius:6px;

    cursor:pointer;

}


/* =====================================================
   IMPRESSÃO
===================================================== */

@media print{

    .acoes-pdf{

        display:none;

    }

}

</style>
